<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>

<groupbox
  id="zotero-prefpane-__addonRef__-settings"
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
>
  <label><html:h2 data-l10n-id="pref-title"></html:h2></label>

  <label><html:h3 data-l10n-id="pref-menu-visibility-title"></html:h3></label>

  <vbox>
    <html:input
      type="checkbox"
      id="zotero-prefpane-__addonRef__-menu-show-one-click-workflow"
    ></html:input>
    <html:label
      for="zotero-prefpane-__addonRef__-menu-show-one-click-workflow"
      data-l10n-id="pref-menu-show-one-click-workflow"
    ></html:label>
  </vbox>

  <vbox>
    <html:input
      type="checkbox"
      id="zotero-prefpane-__addonRef__-menu-show-translate-fulltext"
    ></html:input>
    <html:label
      for="zotero-prefpane-__addonRef__-menu-show-translate-fulltext"
      data-l10n-id="pref-menu-show-translate-fulltext"
    ></html:label>
  </vbox>

  <vbox>
    <html:input
      type="checkbox"
      id="zotero-prefpane-__addonRef__-menu-show-translate-fulltext-default-prompt"
    ></html:input>
    <html:label
      for="zotero-prefpane-__addonRef__-menu-show-translate-fulltext-default-prompt"
      data-l10n-id="pref-menu-show-translate-fulltext-default-prompt"
    ></html:label>
  </vbox>

  <vbox>
    <html:input
      type="checkbox"
      id="zotero-prefpane-__addonRef__-menu-show-mineru-extract"
    ></html:input>
    <html:label
      for="zotero-prefpane-__addonRef__-menu-show-mineru-extract"
      data-l10n-id="pref-menu-show-mineru-extract"
    ></html:label>
  </vbox>

  <vbox>
    <html:input
      type="checkbox"
      id="zotero-prefpane-__addonRef__-menu-show-mineru-view"
    ></html:input>
    <html:label
      for="zotero-prefpane-__addonRef__-menu-show-mineru-view"
      data-l10n-id="pref-menu-show-mineru-view"
    ></html:label>
  </vbox>

  <vbox>
    <html:input
      type="checkbox"
      id="zotero-prefpane-__addonRef__-menu-show-export-translated-pdf"
    ></html:input>
    <html:label
      for="zotero-prefpane-__addonRef__-menu-show-export-translated-pdf"
      data-l10n-id="pref-menu-show-export-translated-pdf"
    ></html:label>
  </vbox>

  <html:p data-l10n-id="pref-menu-visibility-help"></html:p>

  <vbox>
    <html:label
      for="zotero-prefpane-__addonRef__-deepseek-api-key"
      data-l10n-id="pref-deepseek-api-key"
    ></html:label>
    <html:input
      type="password"
      id="zotero-prefpane-__addonRef__-deepseek-api-key"
      autocomplete="off"
    ></html:input>
  </vbox>

  <vbox>
    <html:label
      for="zotero-prefpane-__addonRef__-deepseek-base-url"
      data-l10n-id="pref-deepseek-base-url"
    ></html:label>
    <html:input
      type="text"
      id="zotero-prefpane-__addonRef__-deepseek-base-url"
    ></html:input>
  </vbox>

  <vbox>
    <html:label
      for="zotero-prefpane-__addonRef__-deepseek-prompt"
      data-l10n-id="pref-deepseek-prompt"
    ></html:label>
    <html:textarea
      id="zotero-prefpane-__addonRef__-deepseek-prompt"
      rows="12"
      style="width: 100%"
    ></html:textarea>
    <html:p data-l10n-id="pref-deepseek-prompt-help"></html:p>
  </vbox>

  <html:p data-l10n-id="pref-deepseek-model-note"></html:p>

  <label><html:h3 data-l10n-id="pref-mineru-title"></html:h3></label>

  <vbox>
    <html:label
      for="zotero-prefpane-__addonRef__-mineru-api-token"
      data-l10n-id="pref-mineru-api-token"
    ></html:label>
    <html:input
      type="password"
      id="zotero-prefpane-__addonRef__-mineru-api-token"
      autocomplete="off"
    ></html:input>
  </vbox>

  <vbox>
    <html:label
      for="zotero-prefpane-__addonRef__-mineru-base-url"
      data-l10n-id="pref-mineru-base-url"
    ></html:label>
    <html:input
      type="text"
      id="zotero-prefpane-__addonRef__-mineru-base-url"
    ></html:input>
  </vbox>

  <vbox>
    <html:label
      for="zotero-prefpane-__addonRef__-mineru-model-version"
      data-l10n-id="pref-mineru-model-version"
    ></html:label>
    <html:input
      type="text"
      id="zotero-prefpane-__addonRef__-mineru-model-version"
    ></html:input>
    <html:p data-l10n-id="pref-mineru-model-version-help"></html:p>
  </vbox>

  <vbox>
    <html:label
      for="zotero-prefpane-__addonRef__-mineru-pdf-render-command"
      data-l10n-id="pref-mineru-pdf-render-command"
    ></html:label>
    <html:input
      type="text"
      id="zotero-prefpane-__addonRef__-mineru-pdf-render-command"
    ></html:input>
    <html:p data-l10n-id="pref-mineru-pdf-render-command-help"></html:p>
  </vbox>

  <html:p data-l10n-id="pref-mineru-note"></html:p>

  <label><html:h3 data-l10n-id="pref-export-title"></html:h3></label>

  <vbox>
    <html:label
      for="zotero-prefpane-__addonRef__-export-headless-browser-path"
      data-l10n-id="pref-export-headless-browser-path"
    ></html:label>
    <html:input
      type="text"
      id="zotero-prefpane-__addonRef__-export-headless-browser-path"
    ></html:input>
    <html:p data-l10n-id="pref-export-headless-browser-path-help"></html:p>
  </vbox>

  <vbox>
    <html:label
      for="zotero-prefpane-__addonRef__-export-font-family"
      data-l10n-id="pref-export-font-family"
    ></html:label>
    <html:input
      type="text"
      id="zotero-prefpane-__addonRef__-export-font-family"
    ></html:input>
    <html:p data-l10n-id="pref-export-font-family-help"></html:p>
  </vbox>

  <vbox>
    <html:label
      for="zotero-prefpane-__addonRef__-export-font-size-pt"
      data-l10n-id="pref-export-font-size-pt"
    ></html:label>
    <html:input
      type="text"
      id="zotero-prefpane-__addonRef__-export-font-size-pt"
    ></html:input>
    <html:p data-l10n-id="pref-export-font-size-pt-help"></html:p>
  </vbox>

  <vbox>
    <html:label
      for="zotero-prefpane-__addonRef__-export-body-width-percent"
      data-l10n-id="pref-export-body-width-percent"
    ></html:label>
    <html:input
      type="text"
      id="zotero-prefpane-__addonRef__-export-body-width-percent"
    ></html:input>
    <html:p data-l10n-id="pref-export-body-width-percent-help"></html:p>
  </vbox>

  <vbox>
    <html:label
      for="zotero-prefpane-__addonRef__-export-paragraph-indent-em"
      data-l10n-id="pref-export-paragraph-indent-em"
    ></html:label>
    <html:input
      type="text"
      id="zotero-prefpane-__addonRef__-export-paragraph-indent-em"
    ></html:input>
    <html:p data-l10n-id="pref-export-paragraph-indent-em-help"></html:p>
  </vbox>
</groupbox>

<vbox>
  <html:label
    data-l10n-id="pref-help"
    data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'
  ></html:label>
</vbox>
